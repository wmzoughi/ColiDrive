plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    throw new GradleException("Flutter SDK not found. Define location with flutter.sdk in the local.properties file.")
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    namespace "com.example.colidrive"
    compileSdk 36

    compileOptions {
        // ✅ ACTIVER LE DESUGARING
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        // ✅ AJOUTER CES LIGNES POUR LE DESUGARING
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    defaultConfig {
        applicationId "com.example.colidrive"
        minSdkVersion 24
        targetSdk 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
        debug {
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    // ✅ AJOUTER LA DÉPENDANCE POUR LE DESUGARING
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'

    implementation 'androidx.multidex:multidex:2.0.1'
    implementation 'com.stripe:stripe-android:20.48.0'

    // PLAY CORE POUR LES CLASSES MANQUANTES
    implementation 'com.google.android.play:app-update:2.1.0'
    implementation 'com.google.android.play:asset-delivery:2.2.0'
    implementation 'com.google.android.play:feature-delivery:2.1.0'

    // Core des dépendances
    implementation 'com.google.android.gms:play-services-basement:18.3.0'

    implementation platform('com.google.firebase:firebase-bom:32.7.0')
    implementation 'com.google.firebase:firebase-messaging'
    implementation 'com.google.firebase:firebase-analytics'

    // Multidex
    implementation 'androidx.multidex:multidex:2.0.1'
}

// APPLIQUER LE PLUGIN GOOGLE SERVICES
apply plugin: 'com.google.gms.google-services'

configurations.all {
    exclude group: 'com.facebook.react'
    exclude group: 'com.reactnativestripesdk'
}